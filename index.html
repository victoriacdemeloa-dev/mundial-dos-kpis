<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mundial dos KPIs</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:white;
}

header{
  background:linear-gradient(135deg,#1e3a8a,#0f172a);
  padding:30px;
  text-align:center;
}

h1{
  margin:0;
  font-size:32px;
}

.subtitulo{
  opacity:0.8;
  margin-top:10px;
}

.menu{
  padding:20px;
  text-align:center;
}

select{
  padding:10px;
  border-radius:10px;
  font-size:16px;
}

.secao{
  padding:20px;
}

.card{
  background:#1e293b;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}

.figurinhas{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.figurinha{
  background:white;
  color:black;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.dourada{
  background:gold;
}

.glitter{
  background:linear-gradient(
    45deg,
    #ff00ff,
    #00ffff,
    #ffff00
  );
}

</style>

</head>

<body>

<header>
<h1>🏆 Mundial dos KPIs</h1>
<div class="subtitulo">
Álbum Oficial da Madrugada
</div>
</header>

<div class="menu">

<select>

<option>Capa</option>

<option>Chaveamento</option>

<option>Seleção A</option>

<option>Seleção B</option>

<option>Seleção C</option>

<option>Comissão Técnica</option>

<option>VAR</option>

<option>Gerência</option>

</select>

</div>

<div class="secao">

<div class="card">

<h2>⚽ Bem-vinda ao Mundial dos KPIs</h2>

<p>
Primeira temporada oficial.
</p>

</div>

<div class="card">

<h2>⭐ Exemplos de Figurinhas</h2>

<div class="figurinhas">

<div class="figurinha">
📸<br>
Victoria<br>
Camisa 10
</div>

<div class="figurinha dourada">
🥇<br>
Supervisor<br>
Camisa 01
</div>

<div class="figurinha glitter">
✨<br>
Lenda da Madrugada<br>
Camisa 99
</div>

</div>

</div>

<div class="card">

<h2>🏆 Chaveamento</h2>

<p>

Seleção A × Seleção B<br><br>

Seleção C × Seleção D

</p>

</div>

</div>

</body>
</html>
